background_opacity 0.97

# fonts
font_family UbuntuMono Nerd Font Mono
# font_family SauceCodePro Nerd Font
# font_family Hack Nerd Font
# font_family MesloLGS NF
# font_family DroidSansMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 16.0
disable_ligatures cursor

# cursor
cursor_shape block

# urls
detect_urls yes
open_url_with default
url_style single
allow_hyperlinks yes

# mouse
mouse_hide_wait 3.0
copy_on_select clipboard
strip_trailing_spaces smart

# layouts
enabled_layouts splits, tall, stack

# window layout
window_margin_width 1
window_border_width 1pt
window_padding_width 2 2
draw_minimal_borders yes
inactive_text_alpha 0.80

# advanced
clipboard_control write-clipboard write-primary read-clipboard read-primary
shell_integration enabled

# borderless window (native Wayland on GNOME)
hide_window_decorations titlebar-only
window_title_bar_min_windows 0

# terminal bell
enable_audio_bell no
visual_bell_duration 0.2
# visual_bell_color #e0af68

# scrollback
scrollback_lines 10000

# shortcuts (colors/borders/tabs come from tokyo-night-kitty.conf)
clear_all_shortcuts yes
kitty_mod ctrl+shift

map kitty_mod+f2 edit_config_file
map kitty_mod+f5 load_config_file

map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map kitty_mod+s paste_from_selection

map kitty_mod+shift+up scroll_line_up
map kitty_mod+shift+down scroll_line_down
map kitty_mod+page_up scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+h show_scrollback
map kitty_mod+slash search_scrollback
map kitty_mod+escape kitty_interrupt

map kitty_mod+f10 toggle_maximized
map kitty_mod+f11 toggle_fullscreen

map kitty_mod+equal change_font_size current +1.0
map kitty_mod+minus change_font_size current -1.0
map kitty_mod+0 change_font_size current 0

map kitty_mod+space new_tab_with_cwd
map kitty_mod+i set_tab_title
map kitty_mod+up previous_tab
map kitty_mod+down next_tab
map kitty_mod+, move_tab_backward
map kitty_mod+. move_tab_forward
map kitty_mod+q close_tab
map kitty_mod+n new_os_window

map kitty_mod+enter new_window_with_cwd
map kitty_mod+] next_window
map kitty_mod+[ previous_window
map kitty_mod+l next_layout
map kitty_mod+w close_window
map kitty_mod+' resize_window narrower 2
map kitty_mod+r start_resizing_window
map kitty_mod+f move_window_forward
map kitty_mod+b move_window_backward
map kitty_mod+d detach_window

map kitty_mod+alt+left resize_window narrower 2
map kitty_mod+alt+right resize_window wider 2
map kitty_mod+alt+up resize_window taller 2
map kitty_mod+alt+down resize_window shorter 2

allow_remote_control no


# BEGIN_KITTY_THEME
# Tokyo Night Storm
include current-theme.conf
# END_KITTY_THEME