# change prefix key
# unbind-key C-b
# set-option -g prefix C-a

# bind-key C-a send-prefix

# set default shell
set-option -g default-shell /bin/zsh
set-option -g default-terminal screen-256color

# reload config
bind r source-file ~/.tmux.conf \; display-message "tmux configuration reloaded"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
# requires: yay -S urlview  (AUR; tmux-urlview wraps the urlview binary)
set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-cpu'

# plugin options
set -g @urlview-key 'u'

# prefix-highlight (Tokyo Night Storm)
set -g @prefix_highlight_fg '#1f2335'
set -g @prefix_highlight_bg '#bb9af7'
set -g @prefix_highlight_copy_bg '#73daca'

# enable mouse control
set -g mouse on

# start index at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g set-titles-string "#T"

# detach client
# bind-key d detack
# bind-key C-d detach

# choose a client to detach
# bind-key D choose-client

# display visible indicator of each pane
# bind-key w display-panes

# navigate panes using vim keys and ctrl+jk (no prefix)
bind-key -r j select-pane -t :.-
bind-key -r k select-pane -t :.+

# search text
# bind-key / copy-mode \; send-key ?

# Screen like key bindings

# delete the most recently copied buffer of text
# bind key x delete-buffer

# new window
# bind-key n new-window

# next window
bind-key n next-window

# prev window
bind-key p previous-window

# split windows
# bind-key s split-window -v
# bind-key v split-window -h

# resize panes
bind-key -r < resize-pane -L 5
bind-key -r > resize-pane -R 5
bind-key -r + resize-pane -U 5
bind-key -r - resize-pane -D 5

# kill session (prefix + Shift-k; k alone moves to pane above)
bind-key K confirm-before -p "kill tmux session? (y/n)" kill-session


# Statusbar settings
# toggle statusbar
bind-key C-s set status

# aomout of time which status messages and other indicators display
set -g display-time 1000

## COLORSCHEME: Tokyo Night Storm (matches kitty/current-theme.conf)
set -g status-interval 1
set-option -g status on
set-option -g status-keys vi
set-option -g status-position bottom

# Palette reference:
#   bg #24283b  surface #292e42  dark #1d202f  muted #414868
#   fg #c0caf5  dim #545c7e  soft #a9b1d6
#   blue #7aa2f7  magenta #bb9af7  cyan #7dcfff  teal #73daca
#   yellow #e0af68  red #f7768e  green #9ece6a

set-option -g status-style 'bg=#24283b,fg=#c0caf5'
set-window-option -g window-status-style 'bg=#292e42,fg=#545c7e'
set-window-option -g window-status-activity-style 'bg=#24283b,fg=#e0af68'
set-window-option -g window-status-current-style 'bg=#7aa2f7,fg=#1f2335'

set-option -g pane-active-border-style 'fg=#7aa2f7'
set-option -g pane-border-style 'fg=#292e42'

set-option -g message-style 'bg=#292e42,fg=#c0caf5'
set-option -g message-command-style 'bg=#2e3c64,fg=#c0caf5'

set-option -g display-panes-active-colour '#7aa2f7'
set-option -g display-panes-colour '#414868'

set-window-option -g clock-mode-colour '#7aa2f7'
set-window-option -g window-status-bell-style 'bg=#f7768e,fg=#1d202f'

set-option -g status-justify left
set-option -g status-left-style none
set-option -g status-left-length 80
set-option -g status-right-style none
set-option -g status-right-length 80
set-window-option -g window-status-separator ''

set-option -g status-left '#{prefix_highlight}#[bg=#414868,fg=#c0caf5] #S #[bg=#24283b,fg=#414868,nobold,noitalics,nounderscore]'
set-option -g status-right '#[bg=#24283b,fg=#292e42,nobold,nounderscore,noitalics]#[bg=#292e42,fg=#7dcfff] CPU:#{cpu_fg_color}#{cpu_percentage}#[fg=#7dcfff] RAM:#{ram_fg_color}#{ram_percentage} #[bg=#292e42,fg=#414868,nobold,noitalics,nounderscore]#[bg=#414868,fg=#c0caf5] #h '

set-window-option -g window-status-current-format '#[bg=#7aa2f7,fg=#1f2335,nobold,noitalics,nounderscore]#[bg=#7aa2f7,fg=#1f2335] #I #[bg=#7aa2f7,fg=#24283b,bold] #W #[bg=#24283b,fg=#7aa2f7,nobold,noitalics,nounderscore]'
set-window-option -g window-status-format '#[bg=#292e42,fg=#24283b,noitalics]#[bg=#292e42,fg=#545c7e] #I #[bg=#292e42,fg=#a9b1d6] #W #[bg=#24283b,fg=#292e42,noitalics]'

# vim: set ft=tmux tw=0 nowrap:

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
